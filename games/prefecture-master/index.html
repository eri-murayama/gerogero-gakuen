<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>都道府県マスター - ゲロゲーロ学園</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ====== RESET & BASE ====== */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', 'Kosugi Maru', sans-serif;
      background: linear-gradient(160deg, #1a6b3c 0%, #1e8449 20%, #2196a0 60%, #1565c0 100%);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* dot-map texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 25%, rgba(255,255,255,0.07) 0%, transparent 45%),
        radial-gradient(circle at 85% 70%, rgba(100,220,180,0.08) 0%, transparent 45%),
        radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ====== WRAPPER ====== */
    .game-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 12px 24px;
    }

    /* ====== BACK BUTTON ====== */
    .back-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50px;
      padding: 8px 14px 8px 10px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: 'Zen Maru Gothic', sans-serif;
      transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    }
    .back-btn:hover { background: rgba(255,255,255,0.28); transform: translateY(-1px); }
    .back-btn:active { transform: scale(0.95); }
    .back-btn .frog { font-size: 1.15rem; }

    /* ====== SCREENS ====== */
    .screen {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      position: absolute;
    }

    /* ====== TITLE SCREEN ====== */
    #screen-title {
      padding-top: 60px;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .title-map-emoji {
      font-size: 5rem;
      display: block;
      animation: mapFloat 3s ease-in-out infinite;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
      margin-bottom: 6px;
    }
    @keyframes mapFloat {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-14px) rotate(3deg); }
    }

    .title-frog {
      font-size: 3rem;
      display: block;
      animation: frogBounce 1.8s ease-in-out infinite;
      margin-bottom: 4px;
    }
    @keyframes frogBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      45%       { transform: translateY(-10px) scale(1.1); }
      55%       { transform: translateY(-10px) scale(1.1); }
    }

    .title-main {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      color: #fff;
      text-shadow: 0 0 24px rgba(100,255,180,0.5), 0 4px 10px rgba(0,0,0,0.4);
      margin: 0 0 4px;
      text-align: center;
      animation: titleGlow 2.5s ease-in-out infinite;
    }
    @keyframes titleGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(100,255,180,0.4), 0 4px 10px rgba(0,0,0,0.4); }
      50%       { text-shadow: 0 0 40px rgba(100,255,180,0.8), 0 4px 10px rgba(0,0,0,0.4); }
    }

    .title-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
      margin: 0 0 32px;
      text-align: center;
    }

    .title-card {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 22px 28px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .title-card-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.92);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }
    .title-card-row:last-child { margin-bottom: 0; }
    .title-card-icon { font-size: 1.3rem; flex-shrink: 0; }

    .btn-start {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      color: #1a4a2a;
      border: none;
      border-radius: 50px;
      padding: 18px 52px;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.5rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(67,233,123,0.45), 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-start::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 50%);
      pointer-events: none;
    }
    .btn-start:hover  { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(67,233,123,0.55); }
    .btn-start:active { transform: scale(0.95); }

    /* ====== GAME SCREEN ====== */
    #screen-game {
      padding-top: 62px;
    }

    /* HUD bar */
    .hud {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }

    .hud-chip {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 50px;
      padding: 7px 16px;
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .hud-chip span { font-family: 'Hachi Maru Pop', cursive; font-size: 1.1rem; }

    /* Timer ring */
    .timer-wrap {
      position: relative;
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }
    .timer-svg {
      width: 52px;
      height: 52px;
      transform: rotate(-90deg);
    }
    .timer-bg { fill: none; stroke: rgba(255,255,255,0.2); stroke-width: 4; }
    .timer-ring {
      fill: none;
      stroke: #43e97b;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 132;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .timer-ring.urgent { stroke: #ff6b6b; }
    .timer-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
    }

    /* Progress bar */
    .progress-bar-wrap {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.18);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #43e97b, #38f9d7);
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    /* Prefecture card */
    .pref-card {
      width: 100%;
      background: rgba(255,255,255,0.16);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 24px;
      padding: 22px 20px 18px;
      text-align: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .pref-question-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.72);
      margin-bottom: 6px;
    }
    .pref-name {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(2rem, 9vw, 2.8rem);
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
      margin: 0;
      line-height: 1.2;
    }
    .pref-region {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
      margin-top: 6px;
    }
    .pref-question-text {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.88);
      margin-top: 10px;
      font-weight: 700;
    }

    /* Answer buttons grid */
    .answers-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .ans-btn {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 18px;
      padding: 16px 10px;
      color: #fff;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      line-height: 1.35;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .ans-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .ans-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.28);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    .ans-btn:active:not(:disabled) { transform: scale(0.96); }
    .ans-btn:disabled { cursor: default; }

    .ans-btn.correct {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      border-color: #43e97b;
      color: #1a4a2a;
      transform: scale(1.04);
      box-shadow: 0 6px 24px rgba(67,233,123,0.5);
      animation: correctPop 0.4s ease;
    }
    @keyframes correctPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1.04); }
    }

    .ans-btn.wrong {
      background: linear-gradient(135deg, #ff6b6b, #ee0979);
      border-color: #ff6b6b;
      color: #fff;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .ans-btn.dim { opacity: 0.38; }

    /* Feedback flash */
    .feedback-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .feedback-overlay.show-correct {
      background: radial-gradient(circle, rgba(67,233,123,0.22) 0%, transparent 70%);
      opacity: 1;
    }
    .feedback-overlay.show-wrong {
      background: radial-gradient(circle, rgba(255,80,80,0.22) 0%, transparent 70%);
      opacity: 1;
    }

    /* Feedback popup */
    .feedback-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.6);
      z-index: 300;
      background: rgba(20,40,30,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 20px 36px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: all 0.22s cubic-bezier(0.175,0.885,0.32,1.275);
      border: 2px solid rgba(255,255,255,0.18);
    }
    .feedback-popup.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .feedback-popup .fp-emoji { font-size: 2.4rem; }
    .feedback-popup .fp-text  {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.3rem;
      margin-top: 4px;
    }
    .feedback-popup .fp-correct { color: #43e97b; }
    .feedback-popup .fp-wrong   { color: #ff6b6b; }
    .feedback-popup .fp-answer  {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      margin-top: 4px;
    }

    /* Particles */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 250;
      font-size: 1.4rem;
      animation: particleFly 0.9s ease-out forwards;
    }
    @keyframes particleFly {
      0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.4) rotate(var(--dr)); }
    }

    /* ====== RESULT SCREEN ====== */
    #screen-result {
      padding-top: 70px;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .result-trophy {
      font-size: 4.5rem;
      animation: trophySpin 0.6s ease-out;
      display: block;
      margin-bottom: 6px;
    }
    @keyframes trophySpin {
      0%   { transform: rotate(-20deg) scale(0.5); opacity: 0; }
      60%  { transform: rotate(8deg) scale(1.15); }
      100% { transform: rotate(0deg) scale(1); opacity: 1; }
    }

    .result-title {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(1.5rem, 6vw, 2rem);
      color: #fff;
      text-align: center;
      margin: 0 0 20px;
      text-shadow: 0 3px 12px rgba(0,0,0,0.3);
    }

    .result-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid rgba(255,255,255,0.28);
      border-radius: 28px;
      padding: 26px 30px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .result-score-label {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }
    .result-score-num {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 3.5rem;
      color: #ffd54f;
      text-shadow: 0 0 20px rgba(255,213,79,0.5);
      line-height: 1;
    }
    .result-score-denom {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.6);
    }
    .result-rank {
      margin-top: 14px;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.5rem;
      padding: 10px 24px;
      border-radius: 50px;
      display: inline-block;
    }
    .rank-s  { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #4a3000; }
    .rank-a  { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #2a2a2a; }
    .rank-b  { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
    .rank-c  { background: linear-gradient(135deg, #4ecdc4, #44b09e); color: #fff; }
    .rank-d  { background: linear-gradient(135deg, #aaa, #888); color: #fff; }

    .result-message {
      margin-top: 10px;
      font-size: 1rem;
      color: rgba(255,255,255,0.88);
    }

    .result-breakdown {
      width: 100%;
      max-width: 360px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 9px 14px;
      color: rgba(255,255,255,0.88);
      font-size: 0.88rem;
      gap: 8px;
    }
    .breakdown-pref { font-weight: 700; }
    .breakdown-correct { color: #43e97b; font-size: 1.1rem; }
    .breakdown-wrong   { color: #ff6b6b; font-size: 1.1rem; }

    .result-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 320px;
    }
    .btn-replay {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
      color: #1a4a2a;
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(67,233,123,0.4);
      transition: all 0.2s;
    }
    .btn-replay:hover  { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(67,233,123,0.55); }
    .btn-replay:active { transform: scale(0.96); }

    .btn-back-result {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 14px;
      color: rgba(255,255,255,0.9);
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-back-result:hover  { background: rgba(255,255,255,0.25); transform: translateY(-1px); }
    .btn-back-result:active { transform: scale(0.96); }

    /* ====== FLOATING DECORATIONS ====== */
    .deco {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      font-size: 1.5rem;
      opacity: 0.15;
      animation: decoFloat var(--dur, 8s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes decoFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-20px) rotate(8deg); }
    }

    /* ====== RESPONSIVE ====== */
    @media (min-width: 540px) {
      .game-wrapper {
        padding: 0 20px 30px;
      }
    }
    @media (max-height: 680px) {
      #screen-title  { padding-top: 50px; }
      #screen-game   { padding-top: 52px; }
      #screen-result { padding-top: 55px; }
      .title-map-emoji { font-size: 3.5rem; }
      .title-frog      { font-size: 2rem; }
      .title-main      { font-size: 1.7rem; }
      .title-card      { padding: 14px 20px; margin-bottom: 18px; }
      .pref-card       { padding: 14px 16px 12px; margin-bottom: 12px; }
      .ans-btn         { min-height: 60px; padding: 12px 8px; }
    }
  </style>
</head>
<body>

  <!-- Back button (always visible) -->
  <a href="../../index.html" class="back-btn" id="back-btn">
    <span class="frog">🐸</span>
    <span>もどる</span>
  </a>

  <!-- Floating map decorations -->
  <div class="deco" style="top:8%;  left:5%;  --dur:9s;  --delay:0s">🗺️</div>
  <div class="deco" style="top:20%; right:4%; --dur:7s;  --delay:1.5s">⛩️</div>
  <div class="deco" style="top:60%; left:3%; --dur:11s; --delay:0.8s">🌸</div>
  <div class="deco" style="top:75%; right:5%;--dur:8s;  --delay:2.2s">🏔️</div>
  <div class="deco" style="top:40%; right:3%;--dur:10s; --delay:0.3s">🐟</div>
  <div class="deco" style="top:85%; left:6%;--dur:9s;  --delay:1.1s">🍊</div>

  <!-- Feedback overlay flash -->
  <div class="feedback-overlay" id="feedback-overlay"></div>

  <!-- Feedback popup -->
  <div class="feedback-popup" id="feedback-popup">
    <div class="fp-emoji" id="fp-emoji"></div>
    <div class="fp-text"  id="fp-text"></div>
    <div class="fp-answer" id="fp-answer"></div>
  </div>

  <!-- ========== TITLE SCREEN ========== -->
  <div class="game-wrapper">

    <div class="screen" id="screen-title">
      <span class="title-map-emoji">🗾</span>
      <span class="title-frog">🐸</span>
      <h1 class="title-main">都道府県マスター</h1>
      <p class="title-sub">日本全国の名物・名所を覚えよう！</p>

      <div class="title-card">
        <div class="title-card-row">
          <span class="title-card-icon">📋</span>
          <span>全<strong>10問</strong>のクイズに答えよう</span>
        </div>
        <div class="title-card-row">
          <span class="title-card-icon">⏱️</span>
          <span>1問につき<strong>20秒</strong>以内に答えてね</span>
        </div>
        <div class="title-card-row">
          <span class="title-card-icon">🎯</span>
          <span>都道府県の名物や名所を<strong>4択</strong>で選ぼう</span>
        </div>
      </div>

      <button class="btn-start" id="btn-start">スタート！</button>
    </div>

    <!-- ========== GAME SCREEN ========== -->
    <div class="screen hidden" id="screen-game">

  { prefecture: '鹿児島県', region: '九州地方',     correct: 'さつまあげ',      options: ['さつまあげ',   'ちゃんぽん',   '明太子',       'きびだんご'] },
  { prefecture: '沖縄県',   region: '沖縄地方',     correct: 'シーサー',        options: ['シーサー',     'だるま',       'こけし',       'あかべこ'] },

// ── Audio ──────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, type, duration, vol = 0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function sfxCorrect() {
  playTone(523, 'sine', 0.12, 0.28);
  setTimeout(() => playTone(659, 'sine', 0.12, 0.28), 100);
  setTimeout(() => playTone(784, 'sine', 0.18, 0.28), 200);
}

function sfxWrong() {
  playTone(220, 'sawtooth', 0.18, 0.22);
  setTimeout(() => playTone(180, 'sawtooth', 0.18, 0.22), 130);
}

function sfxTimerTick() {
  playTone(800, 'square', 0.05, 0.06);
}

function sfxCelebration() {
  const notes = [523, 659, 784, 1047, 784, 1047, 1319];
  notes.forEach((n, i) => setTimeout(() => playTone(n, 'sine', 0.15, 0.3), i * 80));
}

function sfxTimeout() {
  playTone(300, 'sawtooth', 0.4, 0.35);
}

// ── Utilities ──────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function $(id) { return document.getElementById(id); }

// ── Game State ─────────────────────────────────────────────────────────
let questions = [];
let currentQ  = 0;
let score     = 0;
let timerVal  = 20;
let timerInterval = null;
let answeredThisQ = false;
let results   = [];   // { pref, correct: bool, answer, rightAnswer }

const TOTAL_Q  = 10;
const TIMER_MAX = 20;
const CIRCUMFERENCE = 2 * Math.PI * 18; // r=18 => ~113.1

// ── Screen helpers ─────────────────────────────────────────────────────
function showScreen(id) {
  ['screen-title', 'screen-game', 'screen-result'].forEach(s => {
    const el = $(s);
    if (el) {
      if (s === id) el.classList.remove('hidden');
      else          el.classList.add('hidden');
    }
  });
}

// ── Particle burst ─────────────────────────────────────────────────────
function spawnParticles(x, y, type) {
  const emojis = type === 'correct'
    ? ['⭐', '✨', '🎉', '🌟', '💫', '🎊']
    : ['💢', '❌', '😅'];
  const count = type === 'correct' ? 8 : 4;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const angle  = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const dist   = 80 + Math.random() * 80;
    el.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    el.style.setProperty('--dy', `${Math.sin(angle) * dist - 40}px`);
    el.style.setProperty('--dr', `${(Math.random() - 0.5) * 360}deg`);
    el.style.left = `${x}px`;
    el.style.top  = `${y}px`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 950);
  }
}

// ── Feedback flash ─────────────────────────────────────────────────────
function flashFeedback(isCorrect, correctAnswer) {
  const overlay = $('feedback-overlay');
  const popup   = $('feedback-popup');
  const emoji   = $('fp-emoji');
  const text    = $('fp-text');
  const answer  = $('fp-answer');

  overlay.className = 'feedback-overlay ' + (isCorrect ? 'show-correct' : 'show-wrong');
  emoji.textContent  = isCorrect ? '⭕' : '❌';
  text.className     = 'fp-text ' + (isCorrect ? 'fp-correct' : 'fp-wrong');
  text.textContent   = isCorrect ? 'せいかい！' : 'ざんねん…';
  answer.textContent = isCorrect ? '' : `こたえ：${correctAnswer}`;
  popup.classList.add('visible');

  setTimeout(() => {
    overlay.className = 'feedback-overlay';
    popup.classList.remove('visible');
  }, 900);
}

// ── Timer ──────────────────────────────────────────────────────────────
function startTimer() {
  timerVal = TIMER_MAX;
  updateTimerUI();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerVal--;
    updateTimerUI();
    if (timerVal <= 5 && timerVal > 0) sfxTimerTick();
    if (timerVal <= 0) {
      clearInterval(timerInterval);
      sfxTimeout();
      handleTimeout();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function updateTimerUI() {
  const ring = $('timer-ring');
  const num  = $('timer-num');
  const ratio = timerVal / TIMER_MAX;
  const offset = CIRCUMFERENCE * (1 - ratio);
  ring.style.strokeDasharray  = CIRCUMFERENCE;
  ring.style.strokeDashoffset = offset;
  ring.classList.toggle('urgent', timerVal <= 5);
  num.textContent = timerVal;
}

// ── Load question ──────────────────────────────────────────────────────
function loadQuestion(idx) {
  answeredThisQ = false;
  const q = questions[idx];

  $('hud-q').textContent    = idx + 1;
  $('hud-score').textContent = score;
  $('pref-name').textContent  = q.prefecture;
  $('pref-region').textContent = q.region;
  $('progress-bar').style.width = `${(idx / TOTAL_Q) * 100}%`;

  // Shuffle options for display
  const shuffledOpts = shuffle(q.options);

  const btns = document.querySelectorAll('.ans-btn');
  btns.forEach((btn, i) => {
    btn.textContent = shuffledOpts[i];
    btn.className   = 'ans-btn';
    btn.disabled    = false;
    btn.dataset.value = shuffledOpts[i];
  });

  startTimer();
}

// ── Handle answer ──────────────────────────────────────────────────────
function handleAnswer(selectedBtn) {
  if (answeredThisQ) return;
  answeredThisQ = true;
  stopTimer();

  const q = questions[currentQ];
  const chosen = selectedBtn.dataset.value;
  const isCorrect = chosen === q.correct;

  // Disable all buttons
  document.querySelectorAll('.ans-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.value === q.correct) {
      btn.classList.add('correct');
    } else if (btn === selectedBtn && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dim');
    }
  });

  if (isCorrect) {
    score++;
    sfxCorrect();
    const rect = selectedBtn.getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, 'correct');
  } else {
    sfxWrong();
    const rect = selectedBtn.getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, 'wrong');
  }

  flashFeedback(isCorrect, q.correct);

  results.push({
    pref: q.prefecture,
    correct: isCorrect,
    answer: chosen,
    rightAnswer: q.correct,
  });

  $('hud-score').textContent = score;

  setTimeout(() => nextQuestion(), 1150);
}

function handleTimeout() {
  if (answeredThisQ) return;
  answeredThisQ = true;

  const q = questions[currentQ];
  document.querySelectorAll('.ans-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.value === q.correct) btn.classList.add('correct');
    else btn.classList.add('dim');
  });

  flashFeedback(false, q.correct);

  results.push({
    pref: q.prefecture,
    correct: false,
    answer: null,
    rightAnswer: q.correct,
  });

  setTimeout(() => nextQuestion(), 1150);
}

// ── Next question / end game ───────────────────────────────────────────
function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_Q) {
    endGame();
  } else {
    loadQuestion(currentQ);
  }
}

// ── End game ───────────────────────────────────────────────────────────
function endGame() {
  showScreen('screen-result');
  $('progress-bar').style.width = '100%';

  $('result-score-num').textContent = score;

  // Rank
  let rank, rankClass, trophy, message;
  if (score === 10) {
    rank = 'Sランク　パーフェクト！'; rankClass = 'rank-s';
    trophy = '🏆'; message = '全問正解！すごい！日本地理マスターだ！';
    sfxCelebration();
  } else if (score >= 8) {
    rank = 'Aランク　すばらしい！'; rankClass = 'rank-a';
    trophy = '🥇'; message = `${10 - score}もん惜しかったね！もう少しで完璧！`;
    sfxCelebration();
  } else if (score >= 6) {
    rank = 'Bランク　よくできました！'; rankClass = 'rank-b';
    trophy = '🥈'; message = 'なかなか上手！もう一度チャレンジしてみよう！';
  } else if (score >= 4) {
    rank = 'Cランク　もう少し！'; rankClass = 'rank-c';
    trophy = '🥉'; message = 'まだまだ伸びしろあり！日本の名物を覚えよう！';
  } else {
    rank = 'Dランク　これから！'; rankClass = 'rank-d';
    trophy = '📚'; message = '難しかったね。また挑戦してみよう！';
  }

  $('result-trophy').textContent = trophy;
  $('result-title').textContent  = score >= 8 ? 'すごい！！' : score >= 5 ? 'よくがんばった！' : 'けっか発表！';
  $('result-message').textContent = message;

  const rankEl = $('result-rank');
  rankEl.textContent = rank;
  rankEl.className   = 'result-rank ' + rankClass;

  // Breakdown
  const bd = $('result-breakdown');
  bd.innerHTML = '';
  results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'breakdown-row';
    row.innerHTML = `
      <span class="breakdown-pref">${r.pref}</span>
      <span>${r.answer || 'タイムアップ'} → <strong>${r.rightAnswer}</strong></span>
      <span class="${r.correct ? 'breakdown-correct' : 'breakdown-wrong'}">${r.correct ? '⭕' : '❌'}</span>`;
    bd.appendChild(row);
  });

  geroShare('#screen-result', {
    gameTitle: '都道府県マスター',
    resultText: 'ランク' + rank,
    age: 'kid'
  });
}

// ── Start game ─────────────────────────────────────────────────────────
function startGame() {
  currentQ  = 0;
  score     = 0;
  results   = [];
  questions = shuffle(ALL_QUESTIONS).slice(0, TOTAL_Q);

  showScreen('screen-game');
  loadQuestion(0);
}

// ── Event listeners ────────────────────────────────────────────────────
$('btn-start').addEventListener('click', () => {
  try { getAudio().resume(); } catch(e){}
  startGame();
});

$('btn-replay').addEventListener('click', () => {
  try { getAudio().resume(); } catch(e){}
  startGame();
});

$('btn-back-result').addEventListener('click', () => {
  window.location.href = '../../index.html';
});

document.querySelectorAll('.ans-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    handleAnswer(this);
  });
});

// Unlock AudioContext on first user gesture (iOS)
document.addEventListener('touchstart', () => {
  try { if (audioCtx) audioCtx.resume(); } catch(e){}
}, { once: true, passive: true });
</script>
