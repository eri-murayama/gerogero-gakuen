<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>難読漢字チャレンジ - ゲロゲーロ学園</title>
  <meta name="description" content="難しい漢字の読み方を当てる大人向け脳トレゲーム。難読漢字15問チャレンジ！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Kosugi+Maru&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
  <style>
    /* ====== BASE ====== */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', 'Kosugi Maru', sans-serif;
      background: linear-gradient(135deg, #1a1040 0%, #2c1654 30%, #1e0e38 60%, #0d0824 100%);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .game-wrapper {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .game-container {
      width: 100%;
      max-width: 500px;
      height: 100%;
      max-height: 860px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0f0a2a 0%, #1a0e40 40%, #120930 100%);
      border-radius: 0;
    }

    @media (min-width: 520px) {
      .game-container {
        border-radius: 28px;
        height: 92vh;
        box-shadow:
          0 0 0 1px rgba(212, 175, 55, 0.25),
          0 20px 80px rgba(0, 0, 0, 0.7),
          inset 0 1px 0 rgba(212, 175, 55, 0.15);
      }
    }

    /* ====== DECORATIVE BACKGROUND ====== */
    .bg-pattern {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-pattern::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(212,175,55,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 30% at 50% 100%, rgba(100,60,180,0.15) 0%, transparent 60%);
    }

    .kanji-float {
      position: absolute;
      font-family: 'Zen Maru Gothic', serif;
      font-weight: 900;
      color: rgba(212, 175, 55, 0.05);
      pointer-events: none;
      animation: kanjiDrift linear infinite;
    }

    @keyframes kanjiDrift {
      0%   { transform: translateY(100vh) rotate(-10deg); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { transform: translateY(-120px) rotate(10deg); opacity: 0; }
    }

    /* ====== SCREENS ====== */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      z-index: 1;
      transition: opacity 0.45s cubic-bezier(.4,0,.2,1), transform 0.45s cubic-bezier(.4,0,.2,1);
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96) translateY(8px);
    }

    /* ====== BACK BUTTON ====== */
    .back-btn {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 100;
      background: rgba(212, 175, 55, 0.15);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 50px;
      padding: 7px 14px;
      color: #d4af37;
      font-size: 0.8rem;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }

    .back-btn:hover {
      background: rgba(212, 175, 55, 0.28);
      border-color: rgba(212, 175, 55, 0.6);
      color: #f0d060;
    }

    .back-btn:active { transform: scale(0.94); }

    /* ====== TITLE SCREEN ====== */
    .title-emblem {
      width: 110px;
      height: 110px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.18), transparent 60%),
                  linear-gradient(135deg, #2a1860 0%, #3d2280 100%);
      border: 2px solid rgba(212, 175, 55, 0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.6rem;
      margin-bottom: 18px;
      box-shadow:
        0 0 0 6px rgba(212,175,55,0.1),
        0 0 40px rgba(212,175,55,0.2),
        0 8px 24px rgba(0,0,0,0.4);
      animation: emblemGlow 3s ease-in-out infinite;
      position: relative;
    }

    @keyframes emblemGlow {
      0%, 100% { box-shadow: 0 0 0 6px rgba(212,175,55,0.1), 0 0 40px rgba(212,175,55,0.2), 0 8px 24px rgba(0,0,0,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(212,175,55,0.18), 0 0 60px rgba(212,175,55,0.35), 0 8px 24px rgba(0,0,0,0.4); }
    }

    .title-main {
      font-family: 'Zen Maru Gothic', serif;
      font-weight: 900;
      font-size: 1.9rem;
      color: #f0d060;
      text-shadow:
        0 0 20px rgba(240,208,96,0.6),
        0 2px 8px rgba(0,0,0,0.5);
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .title-sub {
      font-size: 0.85rem;
      color: rgba(212,175,55,0.65);
      letter-spacing: 0.12em;
      margin-bottom: 26px;
      font-family: 'Kosugi Maru', sans-serif;
    }

    .title-divider {
      width: 180px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
      margin: 0 auto 24px;
    }

    .title-info-cards {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .info-card {
      background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 14px;
      padding: 10px 14px;
      text-align: center;
      min-width: 80px;
    }

    .info-card-icon { font-size: 1.4rem; display: block; margin-bottom: 3px; }

    .info-card-label {
      font-size: 0.72rem;
      color: rgba(212,175,55,0.7);
      font-family: 'Kosugi Maru', sans-serif;
      display: block;
      margin-bottom: 2px;
    }

    .info-card-value {
      font-size: 0.9rem;
      font-weight: 700;
      color: #f0d060;
    }

    .start-btn {
      background: linear-gradient(135deg, #c8982a 0%, #e8c040 40%, #c8982a 100%);
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.15rem;
      font-weight: 900;
      color: #1a0e30;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow:
        0 4px 20px rgba(200,152,42,0.45),
        inset 0 1px 0 rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
      position: relative;
      overflow: hidden;
    }

    .start-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,152,42,0.6), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .start-btn:active { transform: scale(0.96); }

    /* ====== GAME SCREEN ====== */
    #game-screen {
      justify-content: flex-start;
      padding: 14px 16px 16px;
      gap: 0;
    }

    .game-hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-top: 42px;
      flex-shrink: 0;
    }

    .hud-pill {
      background: rgba(212,175,55,0.12);
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      color: #d4af37;
      font-family: 'Kosugi Maru', sans-serif;
    }

    .hud-score {
      font-size: 0.85rem;
      font-weight: 700;
      color: #f0d060;
      font-family: 'Zen Maru Gothic', sans-serif;
    }

    /* TIMER */
    .timer-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .timer-number {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-weight: 900;
      font-size: 1.3rem;
      color: #f0d060;
      min-width: 28px;
      text-align: center;
      transition: color 0.3s;
    }

    .timer-number.warning { color: #ffb84d; }
    .timer-number.danger  { color: #ff5252; animation: timerWarn 0.4s ease-in-out infinite; }

    @keyframes timerWarn {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }

    .timer-track {
      flex: 1;
      height: 7px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .timer-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.1s linear, background 0.3s;
      background: linear-gradient(90deg, #d4af37, #f0d060);
    }

    .timer-fill.warning { background: linear-gradient(90deg, #e08020, #ffb84d); }
    .timer-fill.danger  { background: linear-gradient(90deg, #c0142a, #ff5252); }

    /* KANJI DISPLAY */
    .kanji-card {
      width: 100%;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 60%),
        rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.22);
      border-radius: 20px;
      padding: 20px 16px 16px;
      text-align: center;
      margin-bottom: 14px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .kanji-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
    }

    .kanji-label {
      font-size: 0.72rem;
      color: rgba(212,175,55,0.55);
      letter-spacing: 0.18em;
      font-family: 'Kosugi Maru', sans-serif;
      display: block;
      margin-bottom: 8px;
    }

    .kanji-display {
      font-family: 'Zen Maru Gothic', serif;
      font-weight: 900;
      font-size: 3.4rem;
      color: #ffffff;
      text-shadow:
        0 0 30px rgba(212,175,55,0.25),
        0 2px 10px rgba(0,0,0,0.4);
      letter-spacing: 0.08em;
      line-height: 1.1;
      transition: opacity 0.2s;
    }

    .kanji-display.pop {
      animation: kanjiPop 0.35s cubic-bezier(.2,1.4,.4,1);
    }

    @keyframes kanjiPop {
      0%   { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* CHOICES */
    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      width: 100%;
      flex-shrink: 0;
    }

    .choice-btn {
      padding: 14px 10px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      color: #e8e0ff;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.04em;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .choice-btn:not([disabled]):hover {
      background: rgba(212,175,55,0.15);
      border-color: rgba(212,175,55,0.4);
      color: #f8f0c0;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }

    .choice-btn:not([disabled]):active { transform: scale(0.95); }

    .choice-btn.correct {
      background: linear-gradient(135deg, rgba(50,180,80,0.35), rgba(30,140,60,0.25));
      border-color: #4caf50;
      color: #a0f0a0;
      box-shadow: 0 0 20px rgba(76,175,80,0.3);
      animation: correctPulse 0.4s ease;
    }

    @keyframes correctPulse {
      0%   { transform: scale(0.95); }
      50%  { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    .choice-btn.wrong {
      background: linear-gradient(135deg, rgba(200,30,30,0.35), rgba(160,10,10,0.25));
      border-color: #e53935;
      color: #ff9090;
      animation: wrongShake 0.4s ease;
    }

    @keyframes wrongShake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-5px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    .choice-btn.reveal {
      background: linear-gradient(135deg, rgba(50,180,80,0.25), rgba(30,140,60,0.15));
      border-color: rgba(76,175,80,0.5);
      color: rgba(160,240,160,0.7);
    }

    .choice-btn[disabled] { cursor: default; }

    /* FEEDBACK OVERLAY */
    .feedback-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .feedback-overlay.show { opacity: 1; }

    .feedback-icon {
      font-size: 6rem;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.4));
      animation: feedbackPop 0.45s cubic-bezier(.2,1.5,.4,1);
    }

    @keyframes feedbackPop {
      0%   { transform: scale(0.2) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
    }

    /* ====== RESULT SCREEN ====== */
    .result-emblem {
      font-size: 4.5rem;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 20px rgba(212,175,55,0.5));
      animation: resultBounce 1.2s ease-in-out infinite;
    }

    @keyframes resultBounce {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-10px) rotate(3deg); }
    }

    .result-rank {
      font-family: 'Zen Maru Gothic', serif;
      font-weight: 900;
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    .result-rank.hakase { color: #f0d060; text-shadow: 0 0 30px rgba(240,208,96,0.7); }
    .result-rank.sensei { color: #a0d8ff; text-shadow: 0 0 30px rgba(160,216,255,0.6); }
    .result-rank.gakusei { color: #b0ffb8; text-shadow: 0 0 20px rgba(176,255,184,0.5); }
    .result-rank.shoshinsha { color: #e0b0ff; text-shadow: 0 0 20px rgba(224,176,255,0.5); }

    .result-score-area {
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      padding: 14px 32px;
      margin: 10px 0 16px;
      text-align: center;
    }

    .result-score-label {
      font-size: 0.75rem;
      color: rgba(212,175,55,0.6);
      letter-spacing: 0.15em;
      font-family: 'Kosugi Maru', sans-serif;
      display: block;
      margin-bottom: 4px;
    }

    .result-score-num {
      font-family: 'Zen Maru Gothic', serif;
      font-weight: 900;
      font-size: 3rem;
      color: #f0d060;
      line-height: 1;
    }

    .result-score-num span {
      font-size: 1.2rem;
      color: rgba(240,208,96,0.7);
    }

    .result-comment {
      font-size: 0.92rem;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.6;
      font-family: 'Kosugi Maru', sans-serif;
    }

    .fact-card {
      width: 100%;
      background: rgba(80, 40, 140, 0.25);
      border: 1px solid rgba(160, 100, 255, 0.25);
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .fact-card-title {
      font-size: 0.72rem;
      color: rgba(200,160,255,0.7);
      letter-spacing: 0.15em;
      font-family: 'Kosugi Maru', sans-serif;
      display: block;
      margin-bottom: 6px;
    }

    .fact-card-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.82);
      line-height: 1.65;
      font-family: 'Kosugi Maru', sans-serif;
    }

    .result-buttons {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .replay-btn {
      flex: 2;
      background: linear-gradient(135deg, #c8982a 0%, #e8c040 40%, #c8982a 100%);
      border: none;
      border-radius: 50px;
      padding: 15px 20px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      color: #1a0e30;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(200,152,42,0.4), inset 0 1px 0 rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    .replay-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,152,42,0.55); }
    .replay-btn:active { transform: scale(0.95); }

    .home-btn {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 15px 16px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .home-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .home-btn:active { transform: scale(0.95); }

    /* ====== PARTICLES ====== */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleFly linear forwards;
    }

    @keyframes particleFly {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-200px) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="game-container">

      <!-- Decorative BG -->
      <div class="bg-pattern" id="bg-pattern"></div>

      <!-- Floating particles container -->
      <div class="particles" id="particles"></div>

      <!-- Back button (always visible) -->
      <a class="back-btn" href="../../index.html">🐸 もどる</a>

      <!-- ==============================
           TITLE SCREEN
           ============================== -->
      <div class="screen" id="title-screen">
        <div class="title-emblem">🐸📖</div>
        <div class="title-main">難読漢字<br>チャレンジ</div>
        <div class="title-sub">KANJI READING MASTER</div>
        <div class="title-divider"></div>

        <div class="title-info-cards">
          <div class="info-card">
            <span class="info-card-icon">📝</span>
            <span class="info-card-label">問題数</span>
            <span class="info-card-value">15問</span>
          </div>
          <div class="info-card">
            <span class="info-card-icon">⏱</span>
            <span class="info-card-label">制限時間</span>
            <span class="info-card-value">20秒／問</span>
          </div>
          <div class="info-card">
            <span class="info-card-icon">🎓</span>
            <span class="info-card-label">対象</span>
            <span class="info-card-value">大人向け</span>
          </div>
        </div>

        <button class="start-btn" id="start-btn">はじめる</button>
      </div>

      <!-- ==============================
           GAME SCREEN
           ============================== -->
      <div class="screen hidden" id="game-screen">
        <!-- HUD -->
        <div class="game-hud">
          <div class="hud-pill" id="q-counter">1 / 15</div>
          <div class="hud-score" id="score-display">正解 <span id="score-num">0</span></div>
        </div>

        <!-- Timer -->
        <div class="timer-row">
          <div class="timer-number" id="timer-num">20</div>
          <div class="timer-track">
            <div class="timer-fill" id="timer-fill"></div>
          </div>
        </div>

        <!-- Kanji Card -->
        <div class="kanji-card">
          <span class="kanji-label">この漢字の読み方は？</span>
          <div class="kanji-display" id="kanji-display">海豚</div>
        </div>

        <!-- Choices -->
        <div class="choices-grid" id="choices-grid">
          <button class="choice-btn" data-index="0"></button>
          <button class="choice-btn" data-index="1"></button>
          <button class="choice-btn" data-index="2"></button>
          <button class="choice-btn" data-index="3"></button>
        </div>

        <!-- Feedback overlay -->
        <div class="feedback-overlay" id="feedback-overlay">

    /* ==============================
       WEB AUDIO API
       ============================== */
    let audioCtx = null;

    function getAudioCtx() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      return audioCtx;
    }

    function playTone(freq, type, duration, vol = 0.3, startDelay = 0) {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime + startDelay);
      gain.gain.setValueAtTime(0, ctx.currentTime + startDelay);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + startDelay + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startDelay + duration);
      osc.start(ctx.currentTime + startDelay);
      osc.stop(ctx.currentTime + startDelay + duration + 0.01);
    }

        el.className = 'particle';
        const size = 4 + Math.random() * 7;
        const angle = Math.random() * Math.PI * 2;
        const dist = 30 + Math.random() * 70;
        const dx = Math.cos(angle) * dist;
        el.style.cssText = `
          width: ${size}px; height: ${size}px;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          left: ${x + dx}px; top: ${y}px;
          animation-duration: ${0.6 + Math.random() * 0.5}s;
          animation-delay: ${Math.random() * 0.08}s;
          opacity: 0.9;
        `;
        container.appendChild(el);
        setTimeout(() => el.remove(), 1200);
      }
    }

    /* ==============================
       GAME STATE
       ============================== */
    let questionPool = [];
    let currentIndex = 0;
    let score = 0;
    let timerInterval = null;
    let timeLeft = TIME_PER_QUESTION;
    let answered = false;
    let lastShownKanji = '';

    /* ==============================
       SCREEN MANAGEMENT
       ============================== */
    function showScreen(id) {
      ['title-screen', 'game-screen', 'result-screen'].forEach(s => {
        document.getElementById(s).classList.toggle('hidden', s !== id);
      });
    }

    /* ==============================
       SHUFFLE
       ============================== */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    /* ==============================
       GAME INIT
       ============================== */
    function startGame() {
      soundStart();
      questionPool = shuffle(QUESTIONS).slice(0, TOTAL_QUESTIONS);
      currentIndex = 0;
      score = 0;
      updateScoreDisplay();
      showScreen('game-screen');
      loadQuestion();
    }

    function updateScoreDisplay() {
      document.getElementById('score-num').textContent = score;
    }

    /* ==============================
       LOAD QUESTION
       ============================== */
    function loadQuestion() {
      answered = false;
      const q = questionPool[currentIndex];
      lastShownKanji = q.kanji;

      // Counter
      document.getElementById('q-counter').textContent = `${currentIndex + 1} / ${TOTAL_QUESTIONS}`;

      // Kanji display
      const kanjiEl = document.getElementById('kanji-display');
      kanjiEl.textContent = q.kanji;
      kanjiEl.classList.remove('pop');
      void kanjiEl.offsetWidth; // reflow
      kanjiEl.classList.add('pop');

      // Shuffle options
      const shuffled = shuffle(q.options);
      const buttons = document.querySelectorAll('.choice-btn');
      buttons.forEach((btn, i) => {
        btn.textContent = shuffled[i];
        btn.className = 'choice-btn';
        btn.disabled = false;
        btn.dataset.reading = shuffled[i];
      });

      // Hide feedback
      const fb = document.getElementById('feedback-overlay');
      fb.classList.remove('show');

      // Start timer
      startTimer();
    }

    /* ==============================
       TIMER
       ============================== */
    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = TIME_PER_QUESTION;
      updateTimerUI();

      timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          updateTimerUI();
          clearInterval(timerInterval);
          handleTimeout();
        } else {
          // Tick sound on integer seconds
          if (timeLeft <= 5 && Math.abs(timeLeft - Math.round(timeLeft)) < 0.11) {
            soundTick();
          }
          updateTimerUI();
        }
      }, 100);
    }

    function updateTimerUI() {
      const pct = timeLeft / TIME_PER_QUESTION;
      const numEl = document.getElementById('timer-num');
      const fillEl = document.getElementById('timer-fill');

      numEl.textContent = Math.ceil(timeLeft);
      fillEl.style.width = (pct * 100) + '%';

      const danger  = timeLeft <= 5;
      const warning = timeLeft <= 10 && !danger;

      numEl.classList.toggle('danger',  danger);
      numEl.classList.toggle('warning', warning);
      fillEl.classList.toggle('danger',  danger);
      fillEl.classList.toggle('warning', warning);
    }

    function handleTimeout() {
      if (answered) return;
      answered = true;
      soundTimeout();
      revealCorrect(null);

      setTimeout(() => advance(), 1600);
    }

    /* ==============================
       ANSWER HANDLING
       ============================== */
    function handleChoice(btn) {
      if (answered) return;
      answered = true;
      clearInterval(timerInterval);

      const q = questionPool[currentIndex];
      const chosen = btn.dataset.reading;
      const isCorrect = (chosen === q.correct);

      // Get button position for particles
      const rect = btn.getBoundingClientRect();
      const containerRect = btn.closest('.game-container').getBoundingClientRect();
      const px = rect.left + rect.width / 2 - containerRect.left;
      const py = rect.top + rect.height / 2 - containerRect.top;
      spawnParticles(px, py, isCorrect);

      if (isCorrect) {
        score++;
        updateScoreDisplay();
        soundCorrect();
        btn.classList.add('correct');
        showFeedback('⭕');
      } else {
        soundWrong();
        btn.classList.add('wrong');
        showFeedback('❌');
        revealCorrect(btn);
      }

      // Disable all
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);

      setTimeout(() => advance(), 1500);
    }

    function revealCorrect(wrongBtn) {
      const q = questionPool[currentIndex];
      document.querySelectorAll('.choice-btn').forEach(b => {
        b.disabled = true;
        if (b.dataset.reading === q.correct && b !== wrongBtn) {
          b.classList.add('reveal');
        }
      });
    }

    function showFeedback(icon) {
      const fb = document.getElementById('feedback-overlay');
      const fi = document.getElementById('feedback-icon');
      fi.textContent = icon;
      fb.classList.add('show');
      setTimeout(() => fb.classList.remove('show'), 600);
    }

    /* ==============================
       ADVANCE
       ============================== */
    function advance() {
      currentIndex++;
      if (currentIndex >= TOTAL_QUESTIONS) {
        showResult();
      } else {
        loadQuestion();
      }
    }

    /* ==============================
       RESULT SCREEN
       ============================== */
    function showResult() {
      showScreen('result-screen');
      soundResult(score);

      // Rank
      let rank, comment, emblem, rankClass;
      if (score >= 13) {
        rank = '博士'; emblem = '🏆'; rankClass = 'hakase';
        comment = '素晴らしい！難読漢字の知識は超一流です。\n本物の漢字博士と呼ぶにふさわしい実力！';
      } else if (score >= 10) {
        rank = '先生'; emblem = '🎓'; rankClass = 'sensei';
        comment = 'なかなかの実力！漢字の知識は相当なもの。\nあと少し練習すれば博士の域に達します。';
      } else if (score >= 6) {
        rank = '学生'; emblem = '📚'; rankClass = 'gakusei';
        comment = '基礎はできています。難しい漢字も少し知っていますね。\nもっと漢字の世界を探求してみましょう！';
      } else {
        rank = '初心者'; emblem = '🌱'; rankClass = 'shoshinsha';
        comment = '難読漢字は奥が深い！今日学んだ読み方を\n覚えておくと次回はきっとよくなりますよ。';
      }

      document.getElementById('result-emblem').textContent = emblem;
      const rankEl = document.getElementById('result-rank');
      rankEl.textContent = rank;
      rankEl.className = 'result-rank ' + rankClass;
      document.getElementById('result-score-num').innerHTML = `${score}<span> / 15</span>`;
      document.getElementById('result-comment').textContent = comment;

      // Fact: pick a random question from the pool
      const factQ = questionPool[Math.floor(Math.random() * questionPool.length)];
      document.getElementById('fact-text').innerHTML =
        `<strong>「${factQ.kanji}」（${factQ.correct}）</strong><br>${factQ.fact}`;

      geroShare('#result-screen', {
        gameTitle: '難読漢字チャレンジ',
        resultText: rank,
        age: 'adult'
      });
    }

    /* ==============================
       EVENT LISTENERS
       ============================== */
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('replay-btn').addEventListener('click', startGame);

    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => handleChoice(btn));
    });

    /* ==============================
       INIT
       ============================== */
    initBgPattern();
  })();
  </script>
<script src="../../js/share-gate.js"></script>
</body>
</html>
