<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>いないいないばあ！｜ゲロゲーロ学園</title>
  <meta name="baby-game" content="true">
  <script src="../../js/baby-launcher.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ===== Peek-a-boo Game Styles ===== */
    :root {
      --pb-sky-top: #87CEEB;
      --pb-sky-bottom: #b3e5fc;
      --pb-grass-top: #81c784;
      --pb-grass-bottom: #4caf50;
      --pb-sun: #FFD54F;
      --pb-sun-glow: #FFECB3;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: linear-gradient(180deg, var(--pb-sky-top) 0%, var(--pb-sky-bottom) 55%, var(--pb-grass-top) 55%, var(--pb-grass-bottom) 100%);
      position: relative;
    }

    /* ===== Sun ===== */
    .sun {
      position: absolute;
      top: 20px; right: 30px;
      width: 90px; height: 90px;
      background: var(--pb-sun);
      border-radius: 50%;
      box-shadow: 0 0 40px var(--pb-sun-glow), 0 0 80px rgba(255, 213, 79, 0.4);
      animation: sunPulse 4s ease-in-out infinite;
      z-index: 1;
    }
    .sun::before {
      content: '';
      position: absolute;
      top: -15px; left: -15px; right: -15px; bottom: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 213, 79, 0.3) 0%, transparent 70%);
      animation: sunRotate 20s linear infinite;
    }
    @keyframes sunPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes sunRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== Clouds (decorative) ===== */
    .deco-cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.7;
      z-index: 0;
    }
    .deco-cloud-1 {
      width: 120px; height: 40px; top: 60px; left: 10%;
      animation: cloudDrift 25s linear infinite;
    }
    .deco-cloud-2 {
      width: 80px; height: 30px; top: 30px; left: 50%;
      animation: cloudDrift 30s linear infinite reverse;
    }
    .deco-cloud-1::before, .deco-cloud-2::before {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .deco-cloud-1::before {
      width: 50px; height: 50px; top: -25px; left: 25px;
    }
    .deco-cloud-2::before {
      width: 35px; height: 35px; top: -18px; left: 18px;
    }
    @keyframes cloudDrift {
      0% { transform: translateX(0); }
      50% { transform: translateX(40px); }
      100% { transform: translateX(0); }
    }

    /* ===== Grass details ===== */
    .grass-blades {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 45%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== Game Area ===== */
    .game-area {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 15px;
      padding: 15px;
      padding-top: 30px;
      z-index: 10;
      max-width: 600px;
      max-height: 800px;
      margin: auto;
    }

    /* ===== Hiding Spots ===== */
    .hiding-spot {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-width: 100px;
      min-height: 100px;
    }

    .cover {
      position: absolute;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.4s ease;
      animation: wiggle 2.5s ease-in-out infinite;
    }
    .cover.revealed {
      animation: none;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      15% { transform: rotate(-3deg) scale(1.03); }
      30% { transform: rotate(3deg) scale(1.03); }
      45% { transform: rotate(-2deg) scale(1.01); }
      60% { transform: rotate(2deg) scale(1.01); }
      75% { transform: rotate(0deg) scale(1); }
    }

    /* --- Bush --- */
    .cover-bush {
      background: radial-gradient(ellipse at 50% 60%, #66bb6a 0%, #388e3c 70%, #2e7d32 100%);
      border-radius: 50% 50% 45% 45%;
      box-shadow: 0 8px 20px rgba(56, 142, 60, 0.4), inset 0 -10px 20px rgba(0,0,0,0.1);
    }
    .cover-bush::before {
      content: '🌿';
      font-size: 2em;
      position: absolute;
      top: 10px;
    }

    /* --- Box --- */
    .cover-box {
      background: linear-gradient(145deg, #a1887f 0%, #8d6e63 50%, #6d4c41 100%);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(109, 76, 65, 0.4), inset 0 2px 0 rgba(255,255,255,0.2);
      width: 90%; height: 85%;
    }
    .cover-box::before {
      content: '🎁';
      font-size: 2.5em;
      position: absolute;
    }
    .cover-box::after {
      content: '';
      position: absolute;
      width: 60%; height: 4px;
      background: #ffcc80;
      border-radius: 2px;
      top: 50%;
    }

    /* --- Cloud --- */
    .cover-cloud {
      background: radial-gradient(ellipse at 50% 50%, #ffffff 0%, #e3f2fd 60%, #bbdefb 100%);
      border-radius: 50%;
      width: 100%; height: 80%;
      box-shadow: 0 8px 25px rgba(144, 202, 249, 0.5), inset 0 -5px 15px rgba(144, 202, 249, 0.3);
    }
    .cover-cloud::before {
      content: '';
      position: absolute;
      width: 50%; height: 50%;
      background: white;
      border-radius: 50%;
      top: -15%; left: 25%;
    }
    .cover-cloud::after {
      content: '☁️';
      font-size: 1.5em;
      position: absolute;
      bottom: 10px;
    }

    /* --- Blanket --- */
    .cover-blanket {
      background: linear-gradient(135deg, #f48fb1 0%, #f06292 30%, #ec407a 60%, #e91e63 100%);
      border-radius: 18px;
      width: 95%; height: 85%;
      box-shadow: 0 8px 20px rgba(233, 30, 99, 0.3), inset 0 2px 0 rgba(255,255,255,0.3);
    }
    .cover-blanket::before {
      content: '';
      position: absolute;
      width: 80%; height: 80%;
      border: 3px dashed rgba(255,255,255,0.4);
      border-radius: 12px;
    }
    .cover-blanket::after {
      content: '💤';
      font-size: 1.8em;
      position: absolute;
      top: 8px; right: 12px;
    }

    /* ===== Cover reveal animations ===== */
    .cover-bush.revealed { transform: translateX(-120%) rotate(-20deg); opacity: 0; }
    .cover-box.revealed { transform: translateY(-120%) rotate(15deg); opacity: 0; }
    .cover-cloud.revealed { transform: translateY(-130%) scale(0.5); opacity: 0; }
    .cover-blanket.revealed { transform: translateX(120%) rotate(20deg); opacity: 0; }

    /* ===== Animal Display ===== */
    .animal {
      position: absolute;
      font-size: clamp(60px, 15vw, 100px);
      z-index: 10;
      transform: scale(0);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }
    .animal.visible {
      transform: scale(1);
      animation: animalBounce 0.8s ease-in-out 0.3s infinite alternate;
    }
    @keyframes animalBounce {
      0% { transform: scale(1) translateY(0); }
      100% { transform: scale(1.08) translateY(-8px); }
    }

    /* ===== "ばあ！" Text ===== */
    .baa-text {
      position: absolute;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(28px, 7vw, 48px);
      font-weight: 700;
      color: #ff6f00;
      text-shadow: 2px 2px 0 #fff, -1px -1px 0 #fff, 3px 3px 6px rgba(0,0,0,0.15);
      z-index: 30;
      opacity: 0;
      pointer-events: none;
    }
    .baa-text.show {
      animation: baaAppear 2s ease-out forwards;
    }
    @keyframes baaAppear {
      0% { opacity: 0; transform: scale(0.3) translateY(20px); }
      20% { opacity: 1; transform: scale(1.3) translateY(0); }
      40% { transform: scale(1) translateY(0); }
      80% { opacity: 1; transform: scale(1) translateY(-30px); }
      100% { opacity: 0; transform: scale(0.8) translateY(-60px); }
    }

    /* ===== Animal Name Label ===== */
    .animal-name {
      position: absolute;
      bottom: 8px;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(18px, 4.5vw, 30px);
      font-weight: 700;
      color: #fff;
      background: rgba(0,0,0,0.25);
      border-radius: 20px;
      padding: 4px 16px;
      z-index: 30;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .animal-name.show {
      opacity: 1;
    }

    /* ===== Sparkle & Confetti ===== */
    .sparkle {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      animation: sparkleFade 1s ease-out forwards;
    }
    @keyframes sparkleFade {
      0% { opacity: 1; transform: scale(0) translate(0, 0); }
      50% { opacity: 1; transform: scale(1.2) translate(var(--tx), var(--ty)); }
      100% { opacity: 0; transform: scale(0.5) translate(calc(var(--tx) * 1.5), calc(var(--ty) * 1.5 - 30px)); }
    }

    .confetti {
      position: fixed;
      width: 10px; height: 10px;
      z-index: 100;
      pointer-events: none;
      animation: confettiFall 2s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translateY(100vh) rotate(720deg) scale(0.3); }
    }

    /* ===== Celebration Overlay ===== */
    .celebration {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255, 248, 225, 0.85);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .celebration.active {
      opacity: 1;
      pointer-events: auto;
    }
    .celebration-animals {
      font-size: clamp(50px, 12vw, 80px);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      animation: celebBounce 0.6s ease-in-out infinite alternate;
    }
    @keyframes celebBounce {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(-15px) scale(1.05); }
    }
    .celebration-text {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(30px, 8vw, 50px);
      color: #ff6f00;
      text-shadow: 2px 2px 0 #fff;
      margin-top: 20px;
      animation: celebTextPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes celebTextPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    /* ===== Parent Exit Button ===== */
    .parent-exit {
      position: fixed;
      top: 8px; right: 8px;
      width: 36px; height: 36px;
      font-size: 18px;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 999;
      opacity: 0.3;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* ===== Tap prompt ===== */
    .tap-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(16px, 4vw, 22px);
      color: #fff;
      background: rgba(0,0,0,0.2);
      padding: 8px 24px;
      border-radius: 30px;
      z-index: 15;
      animation: promptPulse 2s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes promptPulse {
      0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
    }

    /* ===== Landscape adjustments ===== */
    @media (orientation: landscape) {
      .game-area {
        padding-top: 15px;
        max-height: 100vh;
      }
      .sun {
        width: 60px; height: 60px;
        top: 10px; right: 50px;
      }
    }

    @media (max-width: 360px) {
      .game-area { gap: 8px; padding: 8px; padding-top: 20px; }
    }
  </style>
</head>
<body>

  <!-- Decorative elements -->
  <div class="sun"></div>
  <div class="deco-cloud deco-cloud-1"></div>
  <div class="deco-cloud deco-cloud-2"></div>

  <!-- Game area with 4 hiding spots -->
  <div class="game-area" id="gameArea">
    <!-- Bush (top-left) -->
    <div class="hiding-spot" id="spot-bush" data-spot="bush">
      <div class="animal" id="animal-bush"></div>
      <div class="animal-name" id="name-bush"></div>
      <div class="baa-text" id="baa-bush">ばあ！</div>
      <div class="cover cover-bush" id="cover-bush"></div>
    </div>

    <!-- Box (top-right) -->
    <div class="hiding-spot" id="spot-box" data-spot="box">
      <div class="animal" id="animal-box"></div>
      <div class="animal-name" id="name-box"></div>
      <div class="baa-text" id="baa-box">ばあ！</div>
      <div class="cover cover-box" id="cover-box"></div>
    </div>

    <!-- Cloud (bottom-left) -->
    <div class="hiding-spot" id="spot-cloud" data-spot="cloud">
      <div class="animal" id="animal-cloud"></div>
      <div class="animal-name" id="name-cloud"></div>
      <div class="baa-text" id="baa-cloud">ばあ！</div>
      <div class="cover cover-cloud" id="cover-cloud"></div>
    </div>

    <!-- Blanket (bottom-right) -->
    <div class="hiding-spot" id="spot-blanket" data-spot="blanket">
      <div class="animal" id="animal-blanket"></div>
      <div class="animal-name" id="name-blanket"></div>
      <div class="baa-text" id="baa-blanket">ばあ！</div>
      <div class="cover cover-blanket" id="cover-blanket"></div>
    </div>
  </div>

  <!-- Tap prompt -->
  <div class="tap-prompt" id="tapPrompt">タッチしてね！🐾</div>

  <!-- Celebration overlay -->
  <div class="celebration" id="celebration">
    <div class="celebration-animals" id="celebAnimals"></div>
    <div class="celebration-text">みんな ばあ！🎉</div>
  </div>

  <!-- Parent exit (hidden, 3-tap) -->
  <button class="parent-exit" id="parentExit" aria-label="保護者メニュー">🐸</button>

  <script src="../../js/audio.js"></script>
  <script>
    /* =============================================
       いないいないばあ！ (Peek-a-boo!)
       For babies aged 1-2
       ============================================= */

    // --- Animal pools per hiding spot ---
    const ANIMAL_POOLS = {
      bush: [
        { emoji: '🐈', name: 'ねこ' },
        { emoji: '🐰', name: 'うさぎ' },
        { emoji: '🐸', name: 'かえる' },
        { emoji: '🦔', name: 'はりねずみ' },
      ],
      box: [
        { emoji: '🐕', name: 'いぬ' },
        { emoji: '🐹', name: 'ハムスター' },
        { emoji: '🐥', name: 'ひよこ' },
        { emoji: '🐱', name: 'こねこ' },
      ],
      cloud: [
        { emoji: '🐦', name: 'とり' },
        { emoji: '🦋', name: 'ちょうちょ' },
        { emoji: '🐝', name: 'はち' },
        { emoji: '⭐', name: 'おほしさま' },
      ],
      blanket: [
        { emoji: '🐻', name: 'くま' },
        { emoji: '🐼', name: 'パンダ' },
        { emoji: '🦊', name: 'きつね' },
        { emoji: '🐯', name: 'とら' },
      ],
    };

    const SPOTS = ['bush', 'box', 'cloud', 'blanket'];
    const SPARKLE_EMOJIS = ['✨', '⭐', '💖', '🌟', '💫', '🎀', '🌈'];
    const CONFETTI_COLORS = ['#ff6b8a', '#ffb74d', '#4ecdc4', '#a78bfa', '#ffd54f', '#81c784', '#f48fb1'];

    let initialized = false;
    let revealCount = 0;
    let spotBusy = {};          // prevent double-tap while animating
    let lastAnimalIndex = {};   // track last shown animal per spot
    let hideTimers = {};

    // --- Parent exit: 3 taps in 2 seconds ---
    let parentTapCount = 0;
    let parentTapTimer = null;

    document.getElementById('parentExit').addEventListener('click', () => {
      parentTapCount++;
      if (parentTapCount === 1) {
        parentTapTimer = setTimeout(() => { parentTapCount = 0; }, 2000);
      }
      if (parentTapCount >= 3) {
        clearTimeout(parentTapTimer);
        parentTapCount = 0;
        geroAudio.stopBGM();
        window.location.href = '../../index.html';
      }
    });

    // --- Init on first touch ---
    function initGame() {
      if (initialized) return;
      initialized = true;
      geroAudio.init();
      geroAudio.startBGM(70, 'F');
      // Hide prompt after a moment
      setTimeout(() => {
        const prompt = document.getElementById('tapPrompt');
        if (prompt) prompt.style.opacity = '0';
        setTimeout(() => { if (prompt) prompt.style.display = 'none'; }, 500);
      }, 3000);
    }

    // --- Random animal from pool (avoid repeating last one) ---
    function getRandomAnimal(spot) {
      const pool = ANIMAL_POOLS[spot];
      let idx;
      do {
        idx = Math.floor(Math.random() * pool.length);
      } while (idx === lastAnimalIndex[spot] && pool.length > 1);
      lastAnimalIndex[spot] = idx;
      return pool[idx];
    }

    // --- Speech synthesis ---
    function speak(text, rate = 0.9) {
      if (!window.speechSynthesis) return;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'ja-JP';
      utterance.rate = rate;
      utterance.pitch = 1.3;
      utterance.volume = 0.8;
      speechSynthesis.speak(utterance);
    }

    // --- Sparkles around an element ---
    function createSparkles(element) {
      const rect = element.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      for (let i = 0; i < 8; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = SPARKLE_EMOJIS[Math.floor(Math.random() * SPARKLE_EMOJIS.length)];
        sparkle.style.fontSize = (16 + Math.random() * 20) + 'px';
        sparkle.style.left = cx + 'px';
        sparkle.style.top = cy + 'px';
        const angle = (Math.PI * 2 / 8) * i + (Math.random() - 0.5) * 0.5;
        const dist = 40 + Math.random() * 60;
        sparkle.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        sparkle.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    // --- Confetti burst ---
    function createConfetti(count = 20) {
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = (10 + Math.random() * 80) + 'vw';
        el.style.top = '-10px';
        el.style.background = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.width = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 10) + 'px';
        el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3500);
      }
    }

    // --- Reveal an animal at a spot ---
    function revealSpot(spot) {
      if (spotBusy[spot]) return;
      spotBusy[spot] = true;
      initGame();

      // Clear any pending hide timer
      if (hideTimers[spot]) {
        clearTimeout(hideTimers[spot]);
        hideTimers[spot] = null;
      }

      const cover = document.getElementById('cover-' + spot);
      const animalEl = document.getElementById('animal-' + spot);
      const nameEl = document.getElementById('name-' + spot);
      const baaEl = document.getElementById('baa-' + spot);
      const spotEl = document.getElementById('spot-' + spot);

      const animal = getRandomAnimal(spot);

      // Phase 1: "いないいない..." suspense
      speak('いないいない');
      geroAudio.playBoop();

      // Phase 2: Reveal after a short delay
      setTimeout(() => {
        // Slide cover away
        cover.classList.add('revealed');

        // Show animal
        animalEl.textContent = animal.emoji;
        animalEl.classList.add('visible');

        // Show name
        nameEl.textContent = animal.name;
        nameEl.classList.add('show');

        // "ばあ！" text
        baaEl.classList.remove('show');
        void baaEl.offsetWidth; // reflow
        baaEl.classList.add('show');

        // Sound + speech
        geroAudio.playCorrect();
        setTimeout(() => speak('ばあ！', 1.0), 200);

        // Sparkles
        createSparkles(spotEl);

        // Increment reveal counter
        revealCount++;

        // Check for celebration (every 6 reveals)
        if (revealCount > 0 && revealCount % 6 === 0) {
          setTimeout(() => triggerCelebration(), 1200);
        }

        // Hide again after a few seconds
        hideTimers[spot] = setTimeout(() => {
          hideSpot(spot);
        }, 4000);

      }, 600);
    }

    // --- Hide the animal back ---
    function hideSpot(spot) {
      const cover = document.getElementById('cover-' + spot);
      const animalEl = document.getElementById('animal-' + spot);
      const nameEl = document.getElementById('name-' + spot);

      animalEl.classList.remove('visible');
      nameEl.classList.remove('show');

      setTimeout(() => {
        cover.classList.remove('revealed');
        spotBusy[spot] = false;
      }, 300);
    }

    // --- Big celebration: all animals pop out ---
    function triggerCelebration() {
      const celebEl = document.getElementById('celebration');
      const celebAnimals = document.getElementById('celebAnimals');

      // Pick a random animal from each spot
      const animals = SPOTS.map(spot => {
        const pool = ANIMAL_POOLS[spot];
        return pool[Math.floor(Math.random() * pool.length)];
      });

      celebAnimals.innerHTML = animals.map(a => `<span>${a.emoji}</span>`).join('');

      celebEl.classList.add('active');
      geroAudio.playCelebration();
      speak('みんな、ばあ！', 0.9);
      createConfetti(30);

      // Dismiss celebration on tap or after timeout
      const dismiss = () => {
        celebEl.classList.remove('active');
        celebEl.removeEventListener('click', dismiss);
        celebEl.removeEventListener('touchstart', dismiss);
      };

      celebEl.addEventListener('click', dismiss);
      celebEl.addEventListener('touchstart', dismiss, { passive: true });
      setTimeout(dismiss, 4000);
    }

    // --- Attach event listeners to hiding spots ---
    SPOTS.forEach(spot => {
      const el = document.getElementById('spot-' + spot);

      el.addEventListener('click', (e) => {
        e.preventDefault();
        revealSpot(spot);
      });

      // Also handle touchstart for faster response on mobile
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        revealSpot(spot);
      }, { passive: false });
    });

    // Init spotBusy and lastAnimalIndex
    SPOTS.forEach(spot => {
      spotBusy[spot] = false;
      lastAnimalIndex[spot] = -1;
    });

  </script>
</body>
</html>
