<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脳トレ計算 - ゲロゲーロ学園</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* ====== BASE ====== */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Zen Maru Gothic', 'Kosugi Maru', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1040 40%, #24243e 100%);
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .game-wrapper {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .game-container {
      width: 100%;
      max-width: 480px;
      height: 100%;
      max-height: 820px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0d0b2a 0%, #1a1245 50%, #0d0b2a 100%);
      border-radius: 0;
    }

    @media (min-width: 500px) {
      .game-container {
        border-radius: 28px;
        height: 92vh;
        box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(120,100,255,0.15);
      }
    }

    /* ====== PARTICLE BACKGROUND ====== */
    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100%) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-20%) scale(1.5); opacity: 0; }
    }

    /* ====== SCREENS ====== */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      z-index: 1;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96) translateY(8px);
    }

    /* ====== BACK BUTTON ====== */
    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 1rem;
      padding: 8px 14px;
      border-radius: 50px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.14);
      transform: translateX(-2px);
    }

    .back-btn:active {
      transform: scale(0.93);
    }

    /* ====== TITLE SCREEN ====== */
    .title-brain {
      font-size: 4rem;
      display: block;
      margin-bottom: 10px;
      animation: brainPulse 2.4s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(160,120,255,0.7));
    }

    @keyframes brainPulse {
      0%, 100% { transform: scale(1) rotate(-3deg); }
      50%       { transform: scale(1.08) rotate(3deg); }
    }

    .title-main {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(1.8rem, 7vw, 2.6rem);
      color: #e8deff;
      text-shadow: 0 0 30px rgba(160,120,255,0.6), 0 4px 12px rgba(0,0,0,0.4);
      margin: 0 0 4px 0;
      letter-spacing: 0.04em;
    }

    .title-sub {
      font-size: 0.9rem;
      color: #8a82b8;
      margin-bottom: 36px;
      letter-spacing: 0.08em;
    }

    .diff-label {
      font-family: 'Kosugi Maru', sans-serif;
      font-size: 0.85rem;
      color: #9d97cc;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .diff-group {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .diff-btn {
      padding: 11px 20px;
      border: 2px solid transparent;
      border-radius: 50px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255,255,255,0.06);
      color: #b0a8d0;
      position: relative;
      overflow: hidden;
    }

    .diff-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
      pointer-events: none;
    }

    .diff-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .diff-btn:active {
      transform: scale(0.93);
    }

    .diff-btn.selected {
      border-color: #9b7cff;
      background: linear-gradient(135deg, rgba(155,124,255,0.25), rgba(100,80,220,0.15));
      color: #fff;
      box-shadow: 0 0 16px rgba(155,124,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .diff-btn.selected.easy   { border-color: #4ecca3; box-shadow: 0 0 16px rgba(78,204,163,0.35), inset 0 1px 0 rgba(255,255,255,0.15); background: linear-gradient(135deg, rgba(78,204,163,0.2), rgba(44,180,140,0.1)); }
    .diff-btn.selected.normal { border-color: #9b7cff; box-shadow: 0 0 16px rgba(155,124,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15); background: linear-gradient(135deg, rgba(155,124,255,0.2), rgba(100,80,220,0.1)); }
    .diff-btn.selected.hard   { border-color: #ff6b8a; box-shadow: 0 0 16px rgba(255,107,138,0.35), inset 0 1px 0 rgba(255,255,255,0.15); background: linear-gradient(135deg, rgba(255,107,138,0.2), rgba(220,60,90,0.1)); }

    .start-btn {
      padding: 18px 52px;
      border: none;
      border-radius: 60px;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.3rem;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #7b5ea7, #9b7cff, #6a4fc8);
      background-size: 200% 200%;
      animation: gradShift 3s ease infinite;
      box-shadow: 0 6px 24px rgba(155,124,255,0.45), 0 2px 0 rgba(255,255,255,0.1) inset;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
      margin-bottom: 32px;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(155,124,255,0.55), 0 2px 0 rgba(255,255,255,0.1) inset;
    }

    .start-btn:active {
      transform: scale(0.95);
      box-shadow: 0 4px 16px rgba(155,124,255,0.35);
    }

    .frog-mascot {
      font-size: 2.4rem;
      opacity: 0.75;
      animation: frogBob 2s ease-in-out infinite;
    }

    @keyframes frogBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-6px) rotate(4deg); }
    }

    .diff-desc {
      font-size: 0.78rem;
      color: #6e68a0;
      text-align: center;
      margin-top: -20px;
      margin-bottom: 28px;
      min-height: 1.2em;
      transition: color 0.2s;
    }

    /* ====== GAME SCREEN ====== */
    .game-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 4px 0;
      margin-bottom: 12px;
    }

    .hud-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 8px 14px;
      text-align: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .hud-label {
      font-size: 0.65rem;
      color: #7a74a8;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    .hud-value {
      font-family: 'Kosugi Maru', monospace;
      font-size: 1.15rem;
      font-weight: 700;
      color: #e0d8ff;
    }

    .hud-value.timer-val {
      font-size: 1.3rem;
      color: #b8ffea;
      letter-spacing: 0.04em;
    }

    .hud-value.combo-val {
      color: #ffd166;
    }

    .combo-badge {
      font-size: 0.6rem;
      background: linear-gradient(135deg, #ff9a3c, #ff6b6b);
      color: #fff;
      border-radius: 50px;
      padding: 2px 7px;
      margin-left: 4px;
      font-weight: 700;
      letter-spacing: 0.04em;
      vertical-align: middle;
      display: inline-block;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .combo-badge.visible { opacity: 1; }

    /* Progress bar */
    .progress-wrap {
      width: calc(100% - 8px);
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 3px;
      margin: 0 4px 16px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #9b7cff, #4ecca3);
      border-radius: 3px;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(155,124,255,0.5);
    }

    /* Problem display */
    .problem-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      min-height: 0;
    }

    .problem-text {
      font-family: 'Kosugi Maru', monospace;
      font-size: clamp(2.2rem, 10vw, 3.4rem);
      font-weight: 700;
      color: #f0ecff;
      text-align: center;
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(155,124,255,0.4), 0 4px 12px rgba(0,0,0,0.3);
      transition: opacity 0.12s ease;
      padding: 0 8px;
      line-height: 1.3;
    }

    .problem-text.flash {
      animation: problemFlash 0.18s ease;
    }

    @keyframes problemFlash {
      0%   { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    .problem-equals {
      font-size: 1.2rem;
      color: #6a648c;
      margin-top: 6px;
      letter-spacing: 0.06em;
    }

    /* Answer choices */
    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      padding: 0 4px;
      margin-top: 24px;
    }

    .choice-btn {
      padding: 20px 12px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      font-family: 'Kosugi Maru', monospace;
      font-size: clamp(1.3rem, 5vw, 1.7rem);
      font-weight: 700;
      color: #d8d0ff;
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .choice-btn:hover {
      border-color: rgba(155,124,255,0.5);
      background: rgba(155,124,255,0.1);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(155,124,255,0.2);
    }

    .choice-btn:active {
      transform: scale(0.95);
    }

    .choice-btn.correct {
      background: linear-gradient(135deg, rgba(78,204,163,0.3), rgba(44,180,140,0.2));
      border-color: #4ecca3;
      color: #4ecca3;
      box-shadow: 0 0 20px rgba(78,204,163,0.4);
      animation: correctPop 0.3s ease;
    }

    .choice-btn.wrong {
      background: linear-gradient(135deg, rgba(255,107,138,0.3), rgba(220,60,90,0.2));
      border-color: #ff6b8a;
      color: #ff6b8a;
      box-shadow: 0 0 20px rgba(255,107,138,0.4);
      animation: wrongShake 0.3s ease;
    }

    @keyframes correctPop {
      0%   { transform: scale(0.95); }
      60%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @keyframes wrongShake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      75%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    .choice-btn:disabled {
      cursor: default;
      pointer-events: none;
    }

    /* Feedback overlay */
    .feedback-overlay {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 2.2rem;
      font-weight: 700;
      pointer-events: none;
      opacity: 0;
      z-index: 20;
      text-shadow: 0 4px 12px rgba(0,0,0,0.4);
      transition: none;
    }

    .feedback-overlay.show-correct {
      animation: feedbackPop 0.6s ease forwards;
      color: #4ecca3;
    }

    .feedback-overlay.show-wrong {
      animation: feedbackPop 0.5s ease forwards;
      color: #ff6b8a;
    }

    @keyframes feedbackPop {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
      30%  { opacity: 1; transform: translate(-50%, -65%) scale(1.2); }
      70%  { opacity: 1; transform: translate(-50%, -75%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
    }

    /* ====== RESULT SCREEN ====== */
    .result-title {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.6rem;
      color: #e8deff;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
    }

    .rank-display {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: clamp(4rem, 16vw, 6rem);
      margin: 0 0 10px 0;
      line-height: 1;
      animation: rankReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes rankReveal {
      0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .rank-S { color: #ffd700; text-shadow: 0 0 30px rgba(255,215,0,0.7), 0 0 60px rgba(255,215,0,0.3); }
    .rank-A { color: #c084fc; text-shadow: 0 0 30px rgba(192,132,252,0.7); }
    .rank-B { color: #60a5fa; text-shadow: 0 0 30px rgba(96,165,250,0.7); }
    .rank-C { color: #a3e635; text-shadow: 0 0 30px rgba(163,230,53,0.6); }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      padding: 14px 12px;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .stat-label {
      font-size: 0.72rem;
      color: #7a74a8;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Kosugi Maru', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      color: #e0d8ff;
    }

    .stat-unit {
      font-size: 0.75rem;
      color: #6a648c;
      margin-left: 2px;
    }

    .result-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .replay-btn {
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 1.1rem;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #7b5ea7, #9b7cff);
      box-shadow: 0 6px 20px rgba(155,124,255,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .replay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(155,124,255,0.5);
    }

    .replay-btn:active {
      transform: scale(0.95);
    }

    .home-link {
      display: block;
      text-align: center;
      color: #7a74a8;
      font-size: 0.95rem;
      text-decoration: none;
      padding: 12px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }

    .home-link:hover {
      color: #b0a8d0;
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.04);
    }

    /* ====== COUNTDOWN ====== */
    .countdown-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,11,42,0.85);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: opacity 0.3s;
    }

    .countdown-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .countdown-number {
      font-family: 'Hachi Maru Pop', cursive;
      font-size: 8rem;
      color: #e8deff;
      text-shadow: 0 0 40px rgba(155,124,255,0.7);
      animation: countPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes countPop {
      0%   { transform: scale(1.5); opacity: 0; }
      50%  { opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ====== DIVIDER ====== */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(155,124,255,0.5), transparent);
      border-radius: 1px;
      margin: 8px auto 20px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="game-container">

      <!-- Particles -->
      <div class="particles" id="particles"></div>

      <!-- Back button (always visible) -->
      <a href="../../index.html" class="back-btn" id="backBtn">🐸 もどる</a>

      <!-- Feedback overlay -->
      <div class="feedback-overlay" id="feedbackOverlay"></div>

      <!-- ==================== TITLE SCREEN ==================== -->
      <div class="screen" id="titleScreen">
        <span class="title-brain">🧠</span>
        <h1 class="title-main">脳トレ計算</h1>
        <p class="title-sub">SPEED CALCULATION BRAIN TRAINING</p>
        <div class="divider"></div>

        <div class="diff-label">難易度を選んでください</div>
        <div class="diff-group">
          <button class="diff-btn easy" data-diff="easy" onclick="selectDiff('easy')">かんたん</button>
          <button class="diff-btn normal selected" data-diff="normal" onclick="selectDiff('normal')">ふつう</button>
          <button class="diff-btn hard" data-diff="hard" onclick="selectDiff('hard')">むずかしい</button>
        </div>
        <p class="diff-desc" id="diffDesc">2桁の四則演算（＋ − ×）</p>

        <button class="start-btn" onclick="startCountdown()">スタート ▶</button>
        <div class="frog-mascot">🐸</div>
      </div>

      <!-- ==================== COUNTDOWN ==================== -->
      <div class="countdown-overlay hidden" id="countdownOverlay">
        <div class="countdown-number" id="countdownNumber">3</div>
      </div>

      <!-- ==================== GAME SCREEN ==================== -->
      <div class="screen hidden" id="gameScreen">
        <div class="game-header">
          <div class="hud-box">
            <div class="hud-label">問題</div>
            <div class="hud-value" id="questionCounter">1 / 20</div>
          </div>
          <div class="hud-box">
            <div class="hud-label">タイム</div>
            <div class="hud-value timer-val" id="timerDisplay">0.0</div>
          </div>
          <div class="hud-box">
            <div class="hud-label">コンボ</div>
            <div class="hud-value combo-val" id="comboDisplay">0
              <span class="combo-badge" id="comboBadge">COMBO</span>
            </div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>

        <div class="problem-area">
          <div class="problem-text" id="problemText">　</div>
          <div class="problem-equals">= ?</div>

          <div class="choices-grid" id="choicesGrid">
            <button class="choice-btn" id="choiceA" onclick="checkAnswer(0)"></button>
            <button class="choice-btn" id="choiceB" onclick="checkAnswer(1)"></button>
            <button class="choice-btn" id="choiceC" onclick="checkAnswer(2)"></button>
            <button class="choice-btn" id="choiceD" onclick="checkAnswer(3)"></button>
          </div>
        </div>
      </div>

      <!-- ==================== RESULT SCREEN ==================== -->
      <div class="screen hidden" id="resultScreen">
        <div class="result-title">結果発表</div>
        <div class="divider"></div>

        <div class="rank-display" id="rankDisplay">A</div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">合計タイム</div>
            <div class="stat-value" id="resultTime">0.0<span class="stat-unit">秒</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">正解率</div>
            <div class="stat-value" id="resultAccuracy">0<span class="stat-unit">%</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">平均タイム</div>
            <div class="stat-value" id="resultAvg">0.0<span class="stat-unit">秒</span></div>
          </div>
          <div class="stat-card">
            <div class="stat-label">最大コンボ</div>
            <div class="stat-value" id="resultCombo">0<span class="stat-unit">連続</span></div>
          </div>
        </div>

        <div class="result-btns">
          <button class="replay-btn" onclick="replayGame()">🔄 もう一度チャレンジ</button>
          <a href="../../index.html" class="home-link">🐸 ゲロゲーロ学園へもどる</a>
        </div>
      </div>

    </div><!-- /.game-container -->
  </div><!-- /.game-wrapper -->

<script>
/* ============================================================
   脳トレ計算 - Game Logic
   ============================================================ */

// ===== Audio Context =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTone(freq, type, duration, vol, startDelay) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + (startDelay || 0));
    gain.gain.setValueAtTime(0, ctx.currentTime + (startDelay || 0));
    gain.gain.linearRampToValueAtTime(vol || 0.18, ctx.currentTime + (startDelay || 0) + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (startDelay || 0) + duration);
    osc.start(ctx.currentTime + (startDelay || 0));
    osc.stop(ctx.currentTime + (startDelay || 0) + duration);
  } catch(e) {}
}

function sfxCorrect() {
  playTone(660, 'sine', 0.12, 0.18);
  playTone(880, 'sine', 0.18, 0.18, 0.08);
}

function sfxWrong() {
  playTone(220, 'sawtooth', 0.2, 0.15);
  playTone(180, 'sawtooth', 0.2, 0.12, 0.1);
}

function sfxCountdown() {
  playTone(440, 'triangle', 0.2, 0.2);
}

function sfxCountdownGo() {
  playTone(660, 'triangle', 0.12, 0.25);
  playTone(880, 'triangle', 0.2, 0.25, 0.1);
}

function sfxComplete() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => playTone(f, 'sine', 0.25, 0.2, i * 0.1));
}

function sfxCombo() {
  playTone(880, 'sine', 0.1, 0.14);
  playTone(1100, 'sine', 0.15, 0.14, 0.06);
}

// ===== State =====
const TOTAL_QUESTIONS = 20;
let difficulty = 'normal';
let questions = [];
let currentQ = 0;
let correctCount = 0;
let combo = 0;
let maxCombo = 0;
let timerInterval = null;
let startTime = 0;
let elapsedMs = 0;
let answerLocked = false;

// ===== Difficulty descriptions =====
const diffDescs = {
  easy:   '2桁の足し算・引き算（例: 34 + 27）',
  normal: '2桁の四則演算（＋ − ×）',
  hard:   '3桁または掛け算2桁×2桁'
};

// ===== Particles =====
function initParticles() {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  const colors = ['#9b7cff', '#4ecca3', '#ff6b8a', '#ffd166', '#60a5fa'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 5;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:0;
      background:${colors[i % colors.length]};
      animation-duration:${5 + Math.random()*8}s;
      animation-delay:${-Math.random()*10}s;
    `;
    container.appendChild(p);
  }
}

// ===== Problem generation =====
function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateProblem() {
  const ops = {
    easy:   ['+', '-'],
    normal: ['+', '-', '×'],
    hard:   ['+', '-', '×']
  };
  const pool = ops[difficulty];
  const op = pool[rnd(0, pool.length - 1)];

  let a, b, answer;

  if (difficulty === 'easy') {
    a = rnd(10, 99);
    b = rnd(10, 99);
    if (op === '-') {
      if (a < b) [a, b] = [b, a];  // keep positive
    }
  } else if (difficulty === 'normal') {
    if (op === '×') {
      a = rnd(11, 29);
      b = rnd(3, 12);
    } else {
      a = rnd(20, 99);
      b = rnd(10, 99);
      if (op === '-' && a < b) [a, b] = [b, a];
    }
  } else { // hard
    if (op === '×') {
      a = rnd(12, 49);
      b = rnd(11, 29);
    } else {
      a = rnd(100, 499);
      b = rnd(100, 399);
      if (op === '-' && a < b) [a, b] = [b, a];
    }
  }

  if (op === '+') answer = a + b;
  else if (op === '-') answer = a - b;
  else answer = a * b;

  return { text: `${a} ${op} ${b}`, answer };
}

function generateChoices(correct) {
  const choices = [correct];
  const spread = Math.max(4, Math.floor(Math.abs(correct) * 0.15) + 3);

  const attempts = [];
  while (choices.length < 4) {
    let wrong;
    const strategy = rnd(0, 2);
    if (strategy === 0) {
      wrong = correct + rnd(-spread, spread);
    } else if (strategy === 1) {
      wrong = correct + (rnd(0,1) === 0 ? -1 : 1) * rnd(1, Math.max(2, Math.floor(Math.abs(correct) * 0.08) + 1));
    } else {
      wrong = correct + (rnd(0,1) === 0 ? -1 : 1) * rnd(spread + 1, spread * 3);
    }
    if (wrong !== correct && wrong > 0 && !choices.includes(wrong)) {
      choices.push(wrong);
    }
    attempts.push(1);
    if (attempts.length > 60) {
      // fallback: just offset
      let fb = correct + choices.length * (rnd(0,1) === 0 ? -1 : 1) * (spread + choices.length);
      while (choices.includes(fb) || fb <= 0) fb += 1;
      choices.push(fb);
    }
  }

  // Fisher-Yates shuffle
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }
  return choices;
}

function buildQuestions() {
  questions = [];
  for (let i = 0; i < TOTAL_QUESTIONS; i++) {
    const prob = generateProblem();
    const choices = generateChoices(prob.answer);
    const correctIdx = choices.indexOf(prob.answer);
    questions.push({ ...prob, choices, correctIdx });
  }
}

// ===== Difficulty select =====
function selectDiff(d) {
  difficulty = d;
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.diff === d);
  });
  document.getElementById('diffDesc').textContent = diffDescs[d];
}

// ===== Countdown =====
function startCountdown() {
  const overlay = document.getElementById('countdownOverlay');
  const num = document.getElementById('countdownNumber');
  overlay.classList.remove('hidden');

  let count = 3;
  num.textContent = count;
  sfxCountdown();

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      num.textContent = count;
      // re-trigger animation
      num.style.animation = 'none';
      void num.offsetWidth;
      num.style.animation = '';
      sfxCountdown();
    } else {
      num.textContent = 'GO！';
      num.style.animation = 'none';
      void num.offsetWidth;
      num.style.animation = '';
      sfxCountdownGo();
      clearInterval(interval);
      setTimeout(() => {
        overlay.classList.add('hidden');
        startGame();
      }, 700);
    }
  }, 800);
}

// ===== Game start =====
function startGame() {
  buildQuestions();
  currentQ = 0;
  correctCount = 0;
  combo = 0;
  maxCombo = 0;
  elapsedMs = 0;
  answerLocked = false;

  showScreen('gameScreen');

  startTime = performance.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 100);

  loadQuestion();
}

function updateTimer() {
  elapsedMs = performance.now() - startTime;
  document.getElementById('timerDisplay').textContent = (elapsedMs / 1000).toFixed(1);
}

function loadQuestion() {
  answerLocked = false;
  const q = questions[currentQ];

  // Update HUD
  document.getElementById('questionCounter').textContent = `${currentQ + 1} / ${TOTAL_QUESTIONS}`;
  document.getElementById('progressBar').style.width = `${(currentQ / TOTAL_QUESTIONS) * 100}%`;

  // Problem
  const pt = document.getElementById('problemText');
  pt.textContent = q.text;
  pt.classList.remove('flash');
  void pt.offsetWidth;
  pt.classList.add('flash');

  // Choices
  const btns = ['choiceA', 'choiceB', 'choiceC', 'choiceD'];
  btns.forEach((id, i) => {
    const btn = document.getElementById(id);
    btn.textContent = q.choices[i];
    btn.className = 'choice-btn';
    btn.disabled = false;
  });
}

// ===== Answer check =====
function checkAnswer(idx) {
  if (answerLocked) return;
  answerLocked = true;

  const q = questions[currentQ];
  const btns = ['choiceA', 'choiceB', 'choiceC', 'choiceD'];
  btns.forEach(id => document.getElementById(id).disabled = true);

  if (idx === q.correctIdx) {
    // Correct
    document.getElementById(btns[idx]).classList.add('correct');
    correctCount++;
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    updateComboHUD();
    showFeedback('correct');
    if (combo >= 3) sfxCombo();
    else sfxCorrect();
  } else {
    // Wrong — show correct in green, wrong in red
    document.getElementById(btns[idx]).classList.add('wrong');
    document.getElementById(btns[q.correctIdx]).classList.add('correct');
    combo = 0;
    updateComboHUD();
    showFeedback('wrong');
    sfxWrong();
  }

  setTimeout(nextQuestion, 550);
}

function updateComboHUD() {
  document.getElementById('comboDisplay').childNodes[0].nodeValue = combo + ' ';
  const badge = document.getElementById('comboBadge');
  badge.classList.toggle('visible', combo >= 3);
}

function showFeedback(type) {
  const el = document.getElementById('feedbackOverlay');
  el.className = 'feedback-overlay';
  void el.offsetWidth;
  if (type === 'correct') {
    const msgs = ['正解！', 'その調子！', 'ナイス！', 'パーフェクト！'];
    el.textContent = combo >= 5 ? `🔥 ${combo}連続！` : msgs[Math.floor(Math.random() * msgs.length)];
    el.classList.add('show-correct');
  } else {
    const msgs = ['不正解…', 'ざんねん！', 'もう一息！'];
    el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    el.classList.add('show-wrong');
  }
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= TOTAL_QUESTIONS) {
    endGame();
  } else {
    loadQuestion();
  }
}

// ===== Game end =====
function endGame() {
  clearInterval(timerInterval);
  const totalMs = performance.now() - startTime;
  elapsedMs = totalMs;

  sfxComplete();

  const totalSec = totalMs / 1000;
  const accuracy = Math.round((correctCount / TOTAL_QUESTIONS) * 100);
  const avgSec = totalSec / TOTAL_QUESTIONS;

  // Rank calculation: based on accuracy + speed
  // S: >=95% accuracy AND avgTime <= 4s
  // A: >=80% accuracy AND avgTime <= 6s
  // B: >=60% accuracy
  // C: otherwise
  let rank, rankClass;
  if (accuracy >= 95 && avgSec <= 4) {
    rank = 'S'; rankClass = 'rank-S';
  } else if (accuracy >= 80 && avgSec <= 6) {
    rank = 'A'; rankClass = 'rank-A';
  } else if (accuracy >= 60) {
    rank = 'B'; rankClass = 'rank-B';
  } else {
    rank = 'C'; rankClass = 'rank-C';
  }

  // Populate result
  document.getElementById('resultTime').innerHTML = `${totalSec.toFixed(1)}<span class="stat-unit">秒</span>`;
  document.getElementById('resultAccuracy').innerHTML = `${accuracy}<span class="stat-unit">%</span>`;
  document.getElementById('resultAvg').innerHTML = `${avgSec.toFixed(1)}<span class="stat-unit">秒</span>`;
  document.getElementById('resultCombo').innerHTML = `${maxCombo}<span class="stat-unit">連続</span>`;

  const rankEl = document.getElementById('rankDisplay');
  rankEl.textContent = rank;
  rankEl.className = `rank-display ${rankClass}`;

  setTimeout(() => showScreen('resultScreen'), 300);
}

// ===== Replay =====
function replayGame() {
  showScreen('titleScreen');
}

// ===== Screen management =====
function showScreen(id) {
  ['titleScreen', 'gameScreen', 'resultScreen'].forEach(sid => {
    document.getElementById(sid).classList.toggle('hidden', sid !== id);
  });
  // Show back btn only on title/result, hide on game (to avoid misclick)
  document.getElementById('backBtn').style.opacity = (id === 'gameScreen') ? '0.35' : '1';
  document.getElementById('backBtn').style.pointerEvents = (id === 'gameScreen') ? 'none' : 'auto';
}

// ===== Init =====
initParticles();
selectDiff('normal');
</script>
</body>
</html>
